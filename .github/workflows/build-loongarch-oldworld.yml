name: Build LoongArch old-world ABI1.0

on:
  workflow_dispatch:
    inputs:
      skiaSharpRef:
        description: SkiaSharp ref or tag
        required: true
        default: v3.119.4
      toolchainUrl:
        description: cross-tools archive URL
        required: true
        default: https://github.com/loong64/cross-tools/releases/download/20260519/x86_64-cross-tools-loongarch64-unknown-linux-gnu-baseline.tar.xz
      sysrootUrl:
        description: Optional old-world development sysroot overlay archive URL
        required: false
        default: https://github.com/YU322142/harfbuzz-Loongarch-ABI1.0/releases/download/oldworld-dev-sysroot-20260607/loongarch64-oldworld-dev-sysroot-overlay-20260607.tar.xz
      sysrootSha256:
        description: Optional old-world development sysroot overlay SHA256
        required: false
        default: AD9DD4DB6C74D085279FF017AB4F743DB2CBA9013A1739BE3C62E56B84CA2F30
  push:
    branches:
      - main
    paths:
      - loongarch-oldworld/**
      - .github/workflows/build-loongarch-oldworld.yml

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 curl xz-utils tar ca-certificates

      - name: Build libHarfBuzzSharp.so
        env:
          SKIASHARP_REF: ${{ github.event.inputs.skiaSharpRef || 'v3.119.4' }}
          TOOLCHAIN_URL: ${{ github.event.inputs.toolchainUrl || 'https://github.com/loong64/cross-tools/releases/download/20260519/x86_64-cross-tools-loongarch64-unknown-linux-gnu-baseline.tar.xz' }}
          SYSROOT_URL: ${{ github.event.inputs.sysrootUrl || '' }}
          SYSROOT_SHA256: ${{ github.event.inputs.sysrootSha256 || '' }}
          MAX_GLIBC: "2.28"
        run: bash loongarch-oldworld/build-harfbuzzsharp.sh

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: libHarfBuzzSharp-linux-loongarch64-oldworld
          path: |
            artifacts/loongarch-oldworld/out/libHarfBuzzSharp.so
            artifacts/loongarch-oldworld/out/libHarfBuzzSharp.so.0.60831.0
            artifacts/loongarch-oldworld/out/native-build-manifest.txt
          if-no-files-found: error
