name: Build LoongArch old-world ABI1.0

on:
  workflow_dispatch:
    inputs:
      skiaSharpRef:
        description: SkiaSharp ref or tag
        required: true
        default: v3.119.4
      toolchainUrl:
        description: Old-world cross toolchain archive URL
        required: true
        default: https://github.com/YU322142/loongarch-oldworld-sysroot/releases/download/oldworld-dev-sysroot-20260607/linux-x64-cross-tools-loongarch64-oldworld-gcc14-20260607.tar.xz
      toolchainSha256:
        description: Old-world cross toolchain archive SHA256
        required: false
        default: 78335E5FCE4FDD6505B23734C539304547753FA1887CC199F5EA0C7554ED0185
      sysrootUrl:
        description: Old-world development sysroot archive URL
        required: false
        default: https://github.com/YU322142/loongarch-oldworld-sysroot/releases/download/oldworld-dev-sysroot-20260607/loongarch64-oldworld-dev-sysroot-20260607.tar.xz
      sysrootSha256:
        description: Old-world development sysroot archive SHA256
        required: false
        default: 5D442178DB80F8C1BC599B5C0E5963071BBBB33270DE05747959ADC65E7BC086
  push:
    branches:
      - main
    paths:
      - loongarch-oldworld/**
      - .github/workflows/build-loongarch-oldworld.yml

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 curl xz-utils tar ca-certificates

      - name: Build libHarfBuzzSharp.so
        env:
          SKIASHARP_REF: ${{ github.event.inputs.skiaSharpRef || 'v3.119.4' }}
          TOOLCHAIN_URL: ${{ github.event.inputs.toolchainUrl || 'https://github.com/YU322142/loongarch-oldworld-sysroot/releases/download/oldworld-dev-sysroot-20260607/linux-x64-cross-tools-loongarch64-oldworld-gcc14-20260607.tar.xz' }}
          TOOLCHAIN_SHA256: ${{ github.event.inputs.toolchainSha256 || '' }}
          SYSROOT_URL: ${{ github.event.inputs.sysrootUrl || '' }}
          SYSROOT_SHA256: ${{ github.event.inputs.sysrootSha256 || '' }}
          MAX_GLIBC: "2.28"
        run: bash loongarch-oldworld/build-harfbuzzsharp.sh

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: libHarfBuzzSharp-linux-loongarch64-oldworld
          path: |
            artifacts/loongarch-oldworld/out/libHarfBuzzSharp.so
            artifacts/loongarch-oldworld/out/libHarfBuzzSharp.so.0.60831.0
            artifacts/loongarch-oldworld/out/native-build-manifest.txt
          if-no-files-found: error
